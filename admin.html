<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Menu - Admin</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar">
        <h2>Dashboard</h2>
        <div>
            <a href="qr.html">QR Code</a>
            <a href="#" id="logout-btn">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div id="notification" class="notification"></div>

        <div class="stats-grid" id="cafe-stats" style="display: none;">
            <div class="stat-card">
                <div>Plan</div>
                <div class="stat-value" id="stat-plan">-</div>
            </div>
            <div class="stat-card">
                <div>Status</div>
                <div class="stat-value" id="stat-status">-</div>
            </div>
            <div class="stat-card">
                <div>Days Left</div>
                <div class="stat-value" id="stat-days">-</div>
            </div>
        </div>

        <div class="card" id="cafe-settings">
            <h3>Cafe Settings</h3>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <input type="text" id="cafe-name" placeholder="Cafe Name">
                <button id="update-cafe-btn" style="width: auto;">Save</button>
            </div>
        </div>

        <div class="card" id="menu-management">
            <h3>Add Menu Item</h3>
            <form id="menu-form" style="margin-top: 15px;">
                <input type="hidden" id="item-id">
                <div class="form-group">
                    <input type="text" id="item-name" placeholder="Item Name" required>
                </div>
                <div class="form-group flex gap-2">
                    <input type="text" id="item-category" placeholder="Category (e.g., Coffee)" required>
                    <input type="number" id="item-price" placeholder="Price" step="0.01" required>
                </div>
                <div class="form-group">
                    <textarea id="item-desc" placeholder="Description"></textarea>
                </div>
                <div class="form-group flex gap-2" style="align-items: center; margin-bottom: 20px;">
                    <input type="checkbox" id="item-active" checked style="width: auto; margin-right: 5px;">
                    <label for="item-active" style="display:inline; color:var(--text-primary); margin:0;">Active (Displayed to customers)</label>
                </div>
                <button type="submit" id="save-item-btn">Save Item</button>
                <button type="button" id="cancel-edit" class="btn-secondary d-none" style="margin-top: 10px;">Cancel Edit</button>
            </form>
        </div>

        <div class="card">
            <h3>Your Menu</h3>
            <div style="margin-top: 15px;" class="menu-list" id="menu-list">
                Loading...
            </div>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script>
        const user = requireAuth();
        let currentCafe = null;
        let isExpired = false;

        document.getElementById('logout-btn').addEventListener('click', () => {
            logoutUser();
        });

        async function init() {
            try {
                // Public select allowed, fetch normally
                const { data: cafes, error } = await supabase
                    .from('cafes')
                    .select('*')
                    .eq('owner_id', user.id);

                if (error) throw error;

                if (!cafes || cafes.length === 0) {
                    // Creating an initial setup requires secure RPC
                    const expiry = new Date();
                    expiry.setDate(expiry.getDate() + 7);
                    
                    const { data: newCafeJson, error: err2 } = await supabase.rpc('secure_upsert_cafe', {
                        p_user_id: user.id,
                        p_password_hash: user.password_hash,
                        p_cafe_id: null,
                        p_name: 'My Cafe',
                        p_plan: 'Trial',
                        p_expiry_date: expiry.toISOString()
                    });

                    if(err2) throw err2;
                    currentCafe = newCafeJson;
                } else {
                    currentCafe = cafes[0];
                }

                updateDashboardUI();
                await loadMenuItems();

            } catch (err) {
                console.error(err);
                showNotification('Init Error: ' + (err.message || 'Failed to load dashboard data'));
            }
        }

        function updateDashboardUI() {
            document.getElementById('cafe-stats').style.display = 'grid';
            document.getElementById('stat-plan').textContent = currentCafe.plan;
            document.getElementById('cafe-name').value = currentCafe.name;

            const now = new Date();
            const expiry = new Date(currentCafe.expiry_date);
            const diffTime = expiry - now;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            isExpired = diffDays < 0 || !currentCafe.is_active;

            document.getElementById('stat-days').textContent = diffDays > 0 ? diffDays : 0;
            document.getElementById('stat-status').textContent = currentCafe.is_active ? (diffDays > 0 ? 'Active' : 'Expired') : 'Inactive';
            document.getElementById('stat-status').style.color = isExpired ? 'var(--danger-color)' : 'var(--success-color)';

            if (isExpired) {
                document.getElementById('menu-form').style.opacity = '0.5';
                document.getElementById('menu-form').style.pointerEvents = 'none';
                showNotification('Your subscription has expired or is inactive. Menu updates are disabled.', 'error');
            }
        }

        document.getElementById('update-cafe-btn').addEventListener('click', async () => {
            if (isExpired) return showNotification('Subscription expired. Cannot update.');
            const name = document.getElementById('cafe-name').value;
            try {
                const { error, data } = await supabase.rpc('secure_upsert_cafe', {
                    p_user_id: user.id,
                    p_password_hash: user.password_hash,
                    p_cafe_id: currentCafe.id,
                    p_name: name,
                    p_plan: currentCafe.plan,
                    p_expiry_date: currentCafe.expiry_date
                });
                if(error) throw error;
                currentCafe.name = name;
                showNotification('Cafe updated naturally!', 'success');
            } catch(e) {
                showNotification('Update failed');
            }
        });

        // Menu CRUD
        async function loadMenuItems() {
            const { data, error } = await supabase.from('menu_items').select('*').eq('cafe_id', currentCafe.id).order('created_at', { ascending: false });
            if(error) return showNotification('Failed to load menu');

            const list = document.getElementById('menu-list');
            list.innerHTML = '';

            if (data.length === 0) {
                list.innerHTML = '<p class="text-secondary text-center">No menu items found. Add some above.</p>';
                return;
            }

            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'menu-item';
                div.innerHTML = `
                    <div class="menu-item-info">
                        <h3>${item.name} ${item.is_active === false ? '<span style="color:var(--danger-color); font-size:0.8rem;">(Inactive)</span>' : ''}</h3>
                        <div class="category">${item.category}</div>
                        <p class="text-secondary" style="font-size:0.9rem; margin-top:5px;">${item.description || ''}</p>
                        <div class="price">$${item.price.toFixed(2)}</div>
                    </div>
                    <div class="menu-item-actions">
                        <button onclick="editItem('${item.id}')" style="background:#555; padding: 8px;">Edit</button>
                        <button onclick="deleteItem('${item.id}')" class="btn-danger" style="padding: 8px;">Delete</button>
                    </div>
                `;
                list.appendChild(div);
            });
            window.menuData = data;
        }

        document.getElementById('menu-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(isExpired) return;

            const id = document.getElementById('item-id').value;
            
            try {
                const { error } = await supabase.rpc('secure_upsert_menu_item', {
                    p_user_id: user.id,
                    p_password_hash: user.password_hash,
                    p_item_id: id ? id : null,
                    p_cafe_id: currentCafe.id,
                    p_name: document.getElementById('item-name').value.trim(),
                    p_category: document.getElementById('item-category').value.trim(),
                    p_price: parseFloat(document.getElementById('item-price').value),
                    p_desc: document.getElementById('item-desc').value.trim(),
                    p_is_active: document.getElementById('item-active').checked
                });

                if (error) throw error;

                if (id) {
                    showNotification('Item updated', 'success');
                } else {
                    showNotification('Item added', 'success');
                }
                document.getElementById('menu-form').reset();
                document.getElementById('item-id').value = '';
                document.getElementById('cancel-edit').classList.add('d-none');
                document.getElementById('save-item-btn').textContent = 'Save Item';
                loadMenuItems();
            } catch(err) {
                showNotification('Action failed: ' + err.message);
            }
        });

        window.editItem = (id) => {
            if(isExpired) return;
            const item = window.menuData.find(i => i.id === id);
            if(!item) return;

            document.getElementById('item-id').value = item.id;
            document.getElementById('item-name').value = item.name;
            document.getElementById('item-category').value = item.category;
            document.getElementById('item-price').value = item.price;
            document.getElementById('item-desc').value = item.description;
            document.getElementById('item-active').checked = item.is_active !== false;

            document.getElementById('save-item-btn').textContent = 'Update Item';
            document.getElementById('cancel-edit').classList.remove('d-none');
        };

        document.getElementById('cancel-edit').addEventListener('click', () => {
            document.getElementById('menu-form').reset();
            document.getElementById('item-id').value = '';
            document.getElementById('save-item-btn').textContent = 'Save Item';
            document.getElementById('cancel-edit').classList.add('d-none');
        });

        window.deleteItem = async (id) => {
            if(isExpired) return;
            if(!confirm('Are you sure you want to delete this menu item?')) return;
            try {
                const { error } = await supabase.rpc('secure_delete_menu_item', {
                    p_user_id: user.id,
                    p_password_hash: user.password_hash,
                    p_item_id: id,
                    p_cafe_id: currentCafe.id
                });
                if(error) throw error;
                showNotification('Item deleted', 'success');
                loadMenuItems();
            } catch(e) {
                showNotification('Delete failed: ' + e.message);
            }
        };

        if(user) init();
    </script>
</body>
</html>
